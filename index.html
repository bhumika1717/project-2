<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetMart - Product Showcase</title>
 <style>
    /* Type selector for body */
body {
    font-family: Arial, sans-serif;
    font-size: 16px;
    margin: 0;
    padding: 0;
}

/* Header styling */
header {
    background-color: #1a3a6b;
    color: #FFFFFF;
    padding: 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 36px;
}

/* Main content */
main {
    padding: 20px;
}

/* Class selector for product cards */
.card {
    background-color: #f5f5f5;
    border: 1px solid #ddd;
    padding: 15px;
    margin: 15px 0;
    border-radius: 8px;
}

.card img {
    width: 100%;
    max-width: 300px;
    height: auto;
    display: block;
    margin-bottom: 15px;
}

.card figcaption {
    padding: 0;
}

/* Title class styling */
.title {
    color: #1a3a6b;
    font-size: 22px;
    margin: 10px 0;
    font-weight: bold;
}

/* Price class styling */
.price {
    color: #e74c3c;
    font-size: 24px;
    margin: 10px 0;
    font-weight: bold;
}

/* Features list */
.card ul {
    margin: 15px 0;
    padding-left: 20px;
}

.card ul li {
    margin: 8px 0;
    color: #333;
}

 </style>
</head>
<body>
    <header>
        <h1>GadgetMart</h1>
    </header>

    <main>
        <figure class="card">
            <center><img src="wireless headphones.png" alt="Wireless Headphones - High quality audio with noise cancellation"></center>
            <figcaption>
                <h2 class="title">Wireless Headphones Pro</h2>
                <p class="price">$129.99</p>
                <ul>
                    <li>Active Noise Cancellation</li>
                    <li>40-hour Battery Life</li>
                    <li>Premium Sound Quality</li>
                    <li>Bluetooth 5.0</li>
                </ul>
            </figcaption>
        </figure>

        <figure class="card">
            <center><img src="smart watch.png" alt="Smart Watch - Fitness tracking and notifications"></center>
            <figcaption>
                <h2 class="title">Smart Watch Elite</h2>
                <p class="price">$249.99</p>
                <ul>
                    <li>Heart Rate Monitor</li>
                    <li>GPS Tracking</li>
                    <li>7-day Battery</li>
                    <li>Water Resistant</li>
                </ul>
            </figcaption>
        </figure>

        <figure class="card">
           <center> <img src="portable speaker.png" alt="Portable Speaker - Compact design with powerful bass"></center>
            <figcaption>
                <h2 class="title">Portable Speaker Max</h2>
                <p class="price">$89.99</p>
                <ul>
                    <li>360° Sound</li>
                    <li>Waterproof Design</li>
                    <li>12-hour Battery</li>
                    <li>Built-in Microphone</li>
                </ul>
            </figcaption>
        </figure>
    </main>
</body>
</html>
